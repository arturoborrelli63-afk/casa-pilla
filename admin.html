<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Casa Pilla</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sea:#1d5f7a;--sea2:#2e87ab;--sand:#f7f2ea;--cream:#fdfaf5;
  --ink:#1c2b35;--muted:#7a8e98;--border:#e0d8cc;--white:#fff;
  --red:#b91c1c;--green:#15803d;
}
body{font-family:'Jost',sans-serif;background:var(--sand);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}

/* ── LOGIN ── */
.login-wrap{
  background:var(--white);border-radius:16px;
  box-shadow:0 20px 60px rgba(15,74,97,.12);
  width:100%;max-width:380px;overflow:hidden;
}
.login-header{
  background:linear-gradient(135deg,#1d5f7a,#2e87ab);
  padding:2rem;text-align:center;
}
.login-header h1{font-family:'Playfair Display',serif;font-size:1.4rem;color:#fff;margin-bottom:.3rem;}
.login-header p{font-size:.75rem;color:rgba(255,255,255,.55);letter-spacing:.15em;text-transform:uppercase;}
.login-body{padding:2rem;}
.login-body label{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.4rem;}
.login-body input{
  width:100%;padding:.75rem 1rem;border:1.5px solid var(--border);border-radius:8px;
  font-family:'Jost',sans-serif;font-size:.9rem;color:var(--ink);outline:none;
  transition:border-color .15s,box-shadow .15s;margin-bottom:1rem;
}
.login-body input:focus{border-color:var(--sea);box-shadow:0 0 0 3px rgba(29,95,122,.08);}
.login-err{font-size:.8rem;color:var(--red);margin-bottom:.8rem;display:none;}
.login-err.on{display:block;}
.btn{
  width:100%;padding:.85rem;
  background:linear-gradient(135deg,#1d5f7a,#2e87ab);
  color:#fff;border:none;border-radius:10px;
  font-family:'Jost',sans-serif;font-size:.9rem;font-weight:500;
  cursor:pointer;transition:opacity .2s;
}
.btn:hover{opacity:.9;}

/* ── ADMIN PANEL ── */
.admin-wrap{
  display:none;
  background:var(--white);border-radius:16px;
  box-shadow:0 20px 60px rgba(15,74,97,.12);
  width:100%;max-width:680px;overflow:hidden;
}
.admin-wrap.on{display:block;}
.admin-header{
  background:linear-gradient(135deg,#1d5f7a,#2e87ab);
  padding:1.5rem 2rem;
  display:flex;align-items:center;justify-content:space-between;
}
.admin-header h1{font-family:'Playfair Display',serif;font-size:1.3rem;color:#fff;}
.admin-header p{font-size:.72rem;color:rgba(255,255,255,.55);margin-top:.2rem;}
.logout-btn{
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  color:#fff;padding:.4rem .9rem;border-radius:8px;font-size:.75rem;
  cursor:pointer;font-family:'Jost',sans-serif;transition:background .15s;
}
.logout-btn:hover{background:rgba(255,255,255,.25);}

.fb-status{
  display:flex;align-items:center;gap:.5rem;
  padding:.6rem 2rem;background:var(--sand);border-bottom:1px solid var(--border);
  font-size:.75rem;color:var(--muted);
}
.fb-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0;}
.fb-dot.ok{background:#22c55e;}
.fb-dot.err{background:var(--red);}

.admin-body{padding:1.5rem 2rem;}

/* ── CALENDAR ── */
.adm-cal-header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;
}
.adm-cal-header h2{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--sea);}
.adm-nav{display:flex;gap:.5rem;}
.adm-nav-btn{
  width:32px;height:32px;border:1px solid var(--border);background:var(--white);
  border-radius:8px;cursor:pointer;font-size:1rem;color:var(--sea);
  display:flex;align-items:center;justify-content:center;transition:background .15s;
}
.adm-nav-btn:hover:not(:disabled){background:rgba(29,95,122,.08);}
.adm-nav-btn:disabled{opacity:.25;cursor:default;}

.adm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1.5rem;}
.adm-dn{text-align:center;font-size:.6rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:.3rem 0 .6rem;}
.adm-day{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  font-size:.8rem;border-radius:7px;cursor:pointer;
  transition:background .12s,color .12s;user-select:none;
  border:1.5px solid transparent;
}
.adm-day.gap{cursor:default;}
.adm-day.past{color:#ccc;cursor:not-allowed;}
.adm-day.free{background:var(--cream);border-color:var(--border);}
.adm-day.free:hover{background:rgba(29,95,122,.1);border-color:var(--sea);color:var(--sea);}
.adm-day.blocked{background:#fee2e2;border-color:#fca5a5;color:var(--red);font-weight:600;}
.adm-day.blocked:hover{background:#fecaca;}
.adm-day.outside{color:#ccc;cursor:not-allowed;background:transparent;border-color:transparent;}

/* ── LEGENDA ── */
.legenda{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:.4rem;font-size:.75rem;color:var(--muted);}
.leg-dot{width:14px;height:14px;border-radius:4px;flex-shrink:0;}
.leg-dot.free{background:var(--cream);border:1.5px solid var(--border);}
.leg-dot.blocked{background:#fee2e2;border:1.5px solid #fca5a5;}

/* ── BLOCKED LIST ── */
.blocked-section{margin-top:1.5rem;border-top:1px solid var(--border);padding-top:1.2rem;}
.blocked-title{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.8rem;}
.blocked-list{display:flex;flex-wrap:wrap;gap:.5rem;}
.blocked-tag{
  display:flex;align-items:center;gap:.4rem;
  background:#fee2e2;border:1px solid #fca5a5;
  color:var(--red);border-radius:999px;
  padding:.3rem .8rem;font-size:.78rem;
}
.blocked-tag button{
  background:none;border:none;color:var(--red);cursor:pointer;
  font-size:.9rem;line-height:1;padding:0;opacity:.7;
}
.blocked-tag button:hover{opacity:1;}
.blocked-empty{font-size:.82rem;color:var(--muted);font-style:italic;}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:.7rem 1.4rem;border-radius:999px;
  font-size:.82rem;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;
  z-index:9999;white-space:nowrap;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-header">
    <h1>🏠 Casa Pilla</h1>
    <p>Pannello Amministratore</p>
  </div>
  <div class="login-body">
    <label>Password</label>
    <input type="password" id="pwdInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-err" id="loginErr">Password errata. Riprova.</div>
    <button class="btn" onclick="doLogin()">Accedi</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-wrap" id="adminWrap">
  <div class="admin-header">
    <div>
      <h1>Gestione disponibilità</h1>
      <p>Clicca su una data per bloccarla o sbloccarla</p>
    </div>
    <button class="logout-btn" onclick="doLogout()">Esci</button>
  </div>

  <div class="fb-status">
    <div class="fb-dot" id="fbDot"></div>
    <span id="fbTxt">Connessione in corso…</span>
  </div>

  <div class="admin-body">

    <div class="adm-cal-header">
      <h2 id="admMonthName"></h2>
      <div class="adm-nav">
        <button class="adm-nav-btn" id="admBtnBack" onclick="admNav(-1)">&#8249;</button>
        <button class="adm-nav-btn" id="admBtnFwd"  onclick="admNav(1)">&#8250;</button>
      </div>
    </div>

    <div class="legenda">
      <div class="leg-item"><div class="leg-dot free"></div> Disponibile</div>
      <div class="leg-item"><div class="leg-dot blocked"></div> Bloccata</div>
    </div>

    <div class="adm-grid" id="admGrid"></div>

    <div class="blocked-section">
      <div class="blocked-title">Date bloccate</div>
      <div class="blocked-list" id="blockedList"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PASSWORD      = 'casapilla2026';
const FIREBASE_CONFIG = {
  apiKey:      'AIzaSyDiCvu5yjd-XAxlM9f-3ETOblQU96yAMqY',
  authDomain:  'casa-pilla.firebaseapp.com',
  databaseURL: 'https://casa-pilla-default-rtdb.europe-west1.firebasedatabase.app',
  projectId:   'casa-pilla',
};

const YEAR   = 2026;
const MIN_M  = 6; // luglio
const MAX_M  = 8; // settembre
const MESI   = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const GIORNI = ['Lu','Ma','Me','Gi','Ve','Sa','Do'];

let BLOCKED   = new Set();
let fbSet     = null;
let fbRemove  = null;
let viewMonth = MIN_M;
let viewYear  = YEAR;

const today = new Date(); today.setHours(0,0,0,0);

// ── LOGIN ──────────────────────────────────────────────
function doLogin() {
  const pwd = document.getElementById('pwdInput').value;
  if (pwd === PASSWORD) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('adminWrap').classList.add('on');
    initFB();
  } else {
    document.getElementById('loginErr').classList.add('on');
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}

function doLogout() {
  document.getElementById('adminWrap').classList.remove('on');
  document.getElementById('loginWrap').style.display = '';
  document.getElementById('pwdInput').value = '';
}

// ── FIREBASE ──────────────────────────────────────────
async function initFB() {
  try {
    const {initializeApp}                      = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const {getDatabase,ref,onValue,set,remove} = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
    initializeApp(FIREBASE_CONFIG);
    const db = getDatabase();

    fbSet    = (k,v) => set(ref(db, k), v);
    fbRemove = (k)   => remove(ref(db, k));

    onValue(ref(db,'blocked_dates'), snap => {
      const d = snap.val() || {};
      BLOCKED = new Set(Object.keys(d).map(k => k.replace(/_/g,'-')));
      renderCalendar();
      renderBlockedList();
    });

    document.getElementById('fbDot').className = 'fb-dot ok';
    document.getElementById('fbTxt').textContent = 'Firebase connesso';
  } catch(e) {
    document.getElementById('fbDot').className = 'fb-dot err';
    document.getElementById('fbTxt').textContent = 'Errore connessione Firebase';
  }
}

// ── TOGGLE DATE ───────────────────────────────────────
async function toggleDay(y, m, d) {
  const dt  = new Date(y, m, d); dt.setHours(0,0,0,0);
  const key = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const fbKey = key.replace(/-/g,'_');

  if (BLOCKED.has(key)) {
    await fbRemove('blocked_dates/' + fbKey);
    showToast('✅ Data sbloccata: ' + formatDate(dt));
  } else {
    await fbSet('blocked_dates/' + fbKey, true);
    showToast('🔒 Data bloccata: ' + formatDate(dt));
  }
}

// ── RENDER CALENDAR ───────────────────────────────────
function renderCalendar() {
  const grid = document.getElementById('admGrid');
  document.getElementById('admMonthName').textContent = MESI[viewMonth] + ' ' + viewYear;

  document.getElementById('admBtnBack').disabled = (viewMonth <= MIN_M);
  document.getElementById('admBtnFwd').disabled  = (viewMonth >= MAX_M);

  let html = '';
  GIORNI.forEach(g => { html += `<div class="adm-dn">${g}</div>`; });

  let off = new Date(viewYear, viewMonth, 1).getDay() - 1;
  if (off < 0) off = 6;
  for (let i = 0; i < off; i++) html += '<div class="adm-day gap"></div>';

  const days = new Date(viewYear, viewMonth + 1, 0).getDate();

  for (let d = 1; d <= days; d++) {
    const dt  = new Date(viewYear, viewMonth, d); dt.setHours(0,0,0,0);
    const key = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const past    = dt < today;
    const blocked = BLOCKED.has(key);

    let cls = 'adm-day';
    if (past)         cls += ' past';
    else if (blocked) cls += ' blocked';
    else              cls += ' free';

    const onclick = past ? '' : `onclick="toggleDay(${viewYear},${viewMonth},${d})"`;
    const title   = blocked ? 'Clicca per sbloccare' : 'Clicca per bloccare';
    html += `<div class="${cls}" ${onclick} title="${title}">${d}</div>`;
  }

  grid.innerHTML = html;
}

// ── RENDER BLOCKED LIST ───────────────────────────────
function renderBlockedList() {
  const list = document.getElementById('blockedList');
  const sorted = [...BLOCKED].sort();

  if (sorted.length === 0) {
    list.innerHTML = '<div class="blocked-empty">Nessuna data bloccata</div>';
    return;
  }

  list.innerHTML = sorted.map(key => {
    const [y,m,d] = key.split('-').map(Number);
    const dt = new Date(y, m-1, d);
    const label = dt.toLocaleDateString('it-IT', {day:'numeric', month:'short', year:'numeric'});
    const fbKey = key.replace(/-/g,'_');
    return `<div class="blocked-tag">
      ${label}
      <button onclick="fbRemove('blocked_dates/${fbKey}')" title="Sblocca">×</button>
    </div>`;
  }).join('');
}

// ── NAVIGATION ────────────────────────────────────────
function admNav(dir) {
  viewMonth += dir;
  if (viewMonth < MIN_M) viewMonth = MIN_M;
  if (viewMonth > MAX_M) viewMonth = MAX_M;
  renderCalendar();
}

// ── HELPERS ───────────────────────────────────────────
function formatDate(d) {
  return d.toLocaleDateString('it-IT', {day:'numeric', month:'long', year:'numeric'});
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2500);
}

// Avvia render iniziale (senza dati, aggiorna quando Firebase risponde)
renderCalendar();
</script>
</body>
</html>
